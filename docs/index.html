<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SpellBound</title>
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SpellBound">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/bold/style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-title-group">
      <img src="logo-header.png" class="app-logo" alt="SpellBound logo">
      <h1 class="app-title">SpellBound</h1>
    </div>
    <div id="sync-status" class="sync-status" onclick="signIn()" title="Tap to sign in with Google"></div>
  </header>
  <main>

    <!-- Home View -->
    <div id="home-view" class="view">
      <div id="home-hero" class="home-hero"></div>
      <div id="reading-books"></div>
      <div class="home-bottom">
        <div id="dog-eared"></div>
        <div id="waitlisted-books"></div>
      </div>
    </div>

    <!-- Books List View -->
    <div id="books-view" class="view hidden">
      <div class="books-toolbar">
        <div class="status-pills">
          <button class="status-pill active" onclick="setStatusFilter('')">All</button>
          <button class="status-pill" onclick="setStatusFilter('Reading')">Reading</button>
          <button class="status-pill" onclick="setStatusFilter('Waitlisted')">Waitlisted</button>
          <button class="status-pill" onclick="setStatusFilter('Paused')">Paused</button>
          <button class="status-pill" onclick="setStatusFilter('Completed')">Completed</button>
        </div>
        <select id="books-status-filter" style="display:none">
          <option value="">All Statuses</option>
          <option value="Reading">Reading</option>
          <option value="Completed">Completed</option>
          <option value="Paused">Paused</option>
          <option value="Waitlisted">Waitlisted</option>
        </select>
        <div class="books-toolbar-row">
          <select id="books-category-filter" onchange="loadBooks()">
            <option value="">All Categories</option>
            <option value="Fiction">Fiction</option>
            <option value="History">History</option>
            <option value="Politics">Politics</option>
            <option value="Philosophy">Philosophy</option>
            <option value="Graphic Novels">Graphic Novels</option>
          </select>
          <button class="fab-inline" onclick="showAddBookForm()">+ Add Book</button>
        </div>
      </div>
      <div id="books-list"></div>
    </div>

    <!-- Book Detail View -->
    <!-- Highlight Detail View -->
    <div id="highlight-detail-view" class="view hidden">
      <div class="highlight-detail-actions">
        <button onclick="showView('home')">&#8592; Back</button>
      </div>
      <div id="highlight-detail-content"></div>
    </div>

    <div id="book-detail-view" class="view hidden">
      <div class="book-detail-actions">
        <button onclick="showView('books')">&#8592; Back to Books</button>
      </div>
      <h2 id="book-title"></h2>
      <div id="book-metadata"></div>
      <div id="book-reflection"></div>
      <button onclick="showAddHighlightForm()">Add Highlight</button>
      <div id="highlights-list"></div>
    </div>

    <!-- Highlights View -->
    <div id="highlights-view" class="view hidden">
      <div class="highlights-toolbar">
        <input type="text" id="highlight-search" placeholder="Search highlights..." oninput="loadHighlights()">
        <div class="highlights-toolbar-row">
          <select id="highlight-category-filter" onchange="loadHighlights()">
            <option value="">All Categories</option>
            <option value="Fiction">Fiction</option>
            <option value="History">History</option>
            <option value="Politics">Politics</option>
            <option value="Philosophy">Philosophy</option>
            <option value="Graphic Novels">Graphic Novels</option>
          </select>
        </div>
        <div class="highlights-toolbar-actions">
          <button class="hl-action-btn" onclick="showAddHighlightForm()">+ Add as text</button>
          <button class="hl-action-btn" onclick="importHighlightFromImage()">&#128247; Add from image</button>
          <input type="file" id="highlight-image-input" accept="image/*" style="display:none" onchange="handleHighlightImageFile(event)">
          <button class="hl-action-btn" onclick="importKindleClippings()">&#128218; Kindle upload</button>
          <input type="file" id="kindle-file-input" accept=".json" style="display:none" onchange="handleKindleFile(event)">
        </div>
      </div>
      <div id="all-highlights"></div>
    </div>

    <!-- Essays View -->
    <div id="essays-view" class="view hidden">
      <button onclick="showAddEssayForm()">Add Essay</button>
      <div id="essays-grid" class="essays-grid"></div>
    </div>

    <!-- Sprint View -->
    <div id="sprint-view" class="view hidden">
      <div class="sprint-header">
        <h2 class="sprint-page-title">Sprint</h2>
        <button class="sprint-new-btn" onclick="showSprintForm()">+ New</button>
      </div>
      <div id="sprint-form" class="sprint-form hidden">
        <input type="text" id="sprint-name" placeholder="Challenge name" required>
        <div class="sprint-duration-row">
          <button type="button" class="sprint-duration-btn active" data-weeks="2">2 weeks</button>
          <button type="button" class="sprint-duration-btn" data-months="1">1 month</button>
          <button type="button" class="sprint-duration-btn" data-months="3">3 months</button>
          <button type="button" class="sprint-duration-btn" data-custom="true">Custom</button>
        </div>
        <div id="sprint-custom-dates" style="display:none;">
          <input type="date" id="sprint-start" placeholder="Start date">
          <input type="date" id="sprint-end" placeholder="End date">
        </div>
        <input type="number" id="sprint-target" placeholder="Target books" min="1" required>
        <div class="sprint-form-actions">
          <button type="button" onclick="saveSprint()">Start Sprint</button>
          <button type="button" onclick="hideSprintForm()">Cancel</button>
        </div>
      </div>
      <div id="sprint-active"></div>
      <div id="sprint-achieved"></div>
      <div id="sprint-archived"></div>
    </div>

    <!-- Wishlist View -->
    <div id="wishlist-view" class="view hidden">
      <div class="books-toolbar">
        <button class="fab-inline" onclick="showAddWishlistForm()">+ Add to Wishlist</button>
      </div>
      <div id="wishlist-list"></div>
    </div>

    <!-- Essay Detail View -->
    <div id="essay-detail-view" class="view hidden">
      <div class="essay-detail-actions no-print">
        <button onclick="showView('essays')">&#8592; Back to Essays</button>
        <button onclick="showEditEssayForm()">Edit</button>
        <button onclick="shareEssay()">&#9993; Gmail</button>
        <button onclick="printEssay()">&#128438; Save as PDF</button>
        <button onclick="handleDeleteEssay(currentEssayId, event)" class="delete-btn">&#128465; Delete</button>
      </div>
      <div class="essay-print-content">
        <h2 id="essay-detail-title"></h2>
        <p id="essay-detail-subtitle" class="essay-detail-subtitle"></p>
        <p id="essay-detail-date" class="essay-detail-meta"></p>
        <p id="essay-detail-tags" class="essay-detail-meta"></p>
        <div id="essay-detail-body" class="essay-body"></div>
      </div>
    </div>

    <!-- Add Book Form -->
    <div id="add-book-form" class="form hidden">
      <h3>Add Book</h3>
      <form onsubmit="addBook(event)">
        <label for="book-title-input">Title</label>
        <input type="text" id="book-title-input" placeholder="Title" required oninput="debounceBookLookup('add')">
        <div id="add-book-suggestions" class="book-suggestions hidden"></div>
        <label for="book-author-input">Author <span style="font-weight:normal;color:#888;">(optional)</span></label>
        <input type="text" id="book-author-input" placeholder="Author">
        <label for="book-status-input">Status</label>
        <select id="book-status-input" required onchange="toggleAddBookFields()">
          <option value="Reading">Reading</option>
          <option value="Completed">Completed</option>
          <option value="Paused">Paused</option>
          <option value="Waitlisted">Waitlisted</option>
        </select>
        <label for="book-category-input">Category</label>
        <select id="book-category-input" required onchange="toggleAddBookFields(); markCategoryManual('add')">
          <option value="Fiction">Fiction</option>
          <option value="History">History</option>
          <option value="Politics">Politics</option>
          <option value="Philosophy">Philosophy</option>
          <option value="Graphic Novels">Graphic Novels</option>
        </select>
        <div id="add-book-completion-fields" style="display:none;">
          <label for="book-date-completed-input">Date Completed</label>
          <input type="date" id="book-date-completed-input">
          <label>How did it land?</label>
          <div class="rating-btn-group" id="add-book-rating-group">
            <button type="button" class="rating-btn" data-value="forgot">&#128566; Already forgot the plot</button>
            <button type="button" class="rating-btn" data-value="goodwhile">&#127810; It was good while it lasted</button>
            <button type="button" class="rating-btn" data-value="rentfree">&#129504; Rent-free in my head</button>
            <button type="button" class="rating-btn" data-value="wrecked">&#128293; Wrecked me (in a good way)</button>
          </div>
          <label for="book-notes-input">Notes</label>
          <textarea id="book-notes-input" placeholder="Notes"></textarea>
          <label for="book-aftertaste-input">Aftertaste</label>
          <textarea id="book-aftertaste-input" placeholder="Aftertaste"></textarea>
        </div>
        <div id="add-book-fav-char-field" style="display:none;">
          <label for="book-fav-char-input">Favourite Character <span style="font-weight:normal;color:#888;">(optional)</span></label>
          <input type="text" id="book-fav-char-input" placeholder="Favourite Character">
        </div>
        <label>Medium (if applicable)</label>
        <div class="medium-btn-group" id="add-book-medium-group">
          <button type="button" class="medium-btn" data-value="kindle">&#128241; Kindle</button>
          <button type="button" class="medium-btn" data-value="audiobook">&#127911; Audiobook</button>
        </div>
        <button type="submit">Add</button>
        <button type="button" onclick="hideForm()">Cancel</button>
      </form>
    </div>

    <!-- Edit Book Form -->
    <div id="edit-book-form" class="form hidden">
      <h3>Edit Book</h3>
      <form onsubmit="updateBook(event)">
        <label for="edit-book-title">Title</label>
        <input type="text" id="edit-book-title" required>
        <button type="button" class="lookup-btn" onclick="triggerEditBookLookup()">&#128269; Look up</button>
        <div id="edit-book-suggestions" class="book-suggestions hidden"></div>
        <label for="edit-book-author">Author <span style="font-weight:normal;color:#888;">(optional)</span></label>
        <input type="text" id="edit-book-author" placeholder="Author">
        <label for="edit-book-status">Status</label>
        <select id="edit-book-status" required onchange="toggleCompletionFields()">
          <option value="Reading">Reading</option>
          <option value="Completed">Completed</option>
          <option value="Paused">Paused</option>
          <option value="Waitlisted">Waitlisted</option>
        </select>
        <label for="edit-book-category">Category</label>
        <select id="edit-book-category" required onchange="toggleCompletionFields(); markCategoryManual('edit')">
          <option value="Fiction">Fiction</option>
          <option value="History">History</option>
          <option value="Politics">Politics</option>
          <option value="Philosophy">Philosophy</option>
          <option value="Graphic Novels">Graphic Novels</option>
        </select>
        <div id="completion-fields" style="display:none;">
          <label for="edit-book-date-completed">Date Completed</label>
          <input type="date" id="edit-book-date-completed">
          <label>How did it land?</label>
          <div class="rating-btn-group" id="edit-book-rating-group">
            <button type="button" class="rating-btn" data-value="forgot">&#128566; Already forgot the plot</button>
            <button type="button" class="rating-btn" data-value="goodwhile">&#127810; It was good while it lasted</button>
            <button type="button" class="rating-btn" data-value="rentfree">&#129504; Rent-free in my head</button>
            <button type="button" class="rating-btn" data-value="wrecked">&#128293; Wrecked me (in a good way)</button>
          </div>
          <label for="edit-book-notes">Notes</label>
          <textarea id="edit-book-notes" placeholder="Notes"></textarea>
          <label for="edit-book-aftertaste">Aftertaste</label>
          <textarea id="edit-book-aftertaste" placeholder="Aftertaste"></textarea>
        </div>
        <div id="edit-book-fav-char-field" style="display:none;">
          <label for="edit-book-fav-char">Favourite Character <span style="font-weight:normal;color:#888;">(optional)</span></label>
          <input type="text" id="edit-book-fav-char" placeholder="Favourite Character">
        </div>
        <label>Medium (if applicable)</label>
        <div class="medium-btn-group" id="edit-book-medium-group">
          <button type="button" class="medium-btn" data-value="kindle">&#128241; Kindle</button>
          <button type="button" class="medium-btn" data-value="audiobook">&#127911; Audiobook</button>
        </div>
        <button type="submit">Save</button>
        <button type="button" onclick="hideForm()">Cancel</button>
      </form>
    </div>

    <!-- Add Highlight Form -->
    <div id="add-highlight-form" class="form hidden">
      <h3>Add Highlight</h3>
      <div id="ocr-section" class="ocr-section" style="display:none;">
        <img id="ocr-preview" class="ocr-preview" src="" alt="">
        <div class="ocr-progress-wrap">
          <div class="ocr-status-text" id="ocr-status-text">Loading OCR engine&hellip;</div>
          <div class="ocr-progress-bar-track">
            <div class="ocr-progress-bar-fill" id="ocr-progress-bar-fill"></div>
          </div>
        </div>
      </div>
      <form onsubmit="addHighlight(event)">
        <div id="book-choice-section" style="display: none;">
          <div class="radio-group">
            <button type="button" class="radio-label active" data-choice="existing" onclick="toggleBookChoice('existing')">Select existing book</button>
            <button type="button" class="radio-label" data-choice="new" onclick="toggleBookChoice('new')">Add new book</button>
          </div>
          <div id="existing-book-section">
            <label>Book</label>
            <div class="book-combobox" id="book-combobox">
              <input type="text" id="highlight-book-filter" placeholder="Select a book…" oninput="filterBookSelect()" onclick="openBookDropdown()" autocomplete="off" data-no-voice>
              <div id="book-dropdown" class="book-dropdown hidden"></div>
            </div>
            <select id="highlight-book-select" required style="display:none"></select>
          </div>
          <div id="new-book-section" style="display: none;">
            <label for="new-book-title">Book Title</label>
            <input type="text" id="new-book-title" placeholder="Book Title">
            <label for="new-book-status">Status</label>
            <select id="new-book-status">
              <option value="Reading">Reading</option>
              <option value="Waitlisted">Waitlisted</option>
            </select>
            <label for="new-book-category">Category</label>
            <select id="new-book-category">
              <option value="Fiction">Fiction</option>
              <option value="History">History</option>
              <option value="Politics">Politics</option>
              <option value="Philosophy">Philosophy</option>
              <option value="Graphic Novels">Graphic Novels</option>
            </select>
          </div>
        </div>
        <label for="highlight-text-input">Highlight Text</label>
        <textarea id="highlight-text-input" placeholder="Highlight text" required></textarea>
        <label for="why-stayed-input">Why it stayed</label>
        <textarea id="why-stayed-input" placeholder="Why it stayed"></textarea>
        <label for="highlight-date-input">Date</label>
        <input type="date" id="highlight-date-input">
        <button type="submit">Add</button>
        <button type="button" onclick="hideForm()">Cancel</button>
      </form>
    </div>

    <!-- Edit Highlight Form -->
    <div id="edit-highlight-form" class="form hidden">
      <h3>Edit Highlight</h3>
      <form onsubmit="updateHighlight(event)">
        <label for="edit-highlight-text">Highlight Text</label>
        <textarea id="edit-highlight-text" required></textarea>
        <label for="edit-highlight-why">Why it stayed</label>
        <textarea id="edit-highlight-why" placeholder="Why it stayed"></textarea>
        <label for="edit-highlight-date">Date</label>
        <input type="date" id="edit-highlight-date">
        <button type="submit">Save</button>
        <button type="button" onclick="hideForm()">Cancel</button>
      </form>
    </div>

    <!-- Add Essay Form -->
    <div id="add-essay-form" class="form hidden">
      <h3>Add Essay</h3>
      <form onsubmit="addEssay(event)">
        <label for="essay-title-input">Title</label>
        <input type="text" id="essay-title-input" placeholder="Title" required>
        <label for="essay-subtitle-input">Subtitle</label>
        <input type="text" id="essay-subtitle-input" placeholder="Subtitle (optional)">
        <label for="essay-date-input">Date</label>
        <input type="date" id="essay-date-input">
        <label for="essay-tags-input">Tags</label>
        <input type="text" id="essay-tags-input" placeholder="e.g. Personal, Academic (optional)">
        <label for="essay-content-input">Content (Markdown)</label>
        <textarea id="essay-content-input" placeholder="Write your essay in Markdown..." required rows="15"></textarea>
        <button type="submit">Add</button>
        <button type="button" onclick="hideForm()">Cancel</button>
      </form>
    </div>

    <!-- Edit Essay Form -->
    <div id="edit-essay-form" class="form hidden">
      <h3>Edit Essay</h3>
      <form onsubmit="updateEssay(event)">
        <label for="edit-essay-title">Title</label>
        <input type="text" id="edit-essay-title" required>
        <label for="edit-essay-subtitle">Subtitle</label>
        <input type="text" id="edit-essay-subtitle">
        <label for="edit-essay-date">Date</label>
        <input type="date" id="edit-essay-date">
        <label for="edit-essay-tags">Tags</label>
        <input type="text" id="edit-essay-tags">
        <label for="edit-essay-content">Content (Markdown)</label>
        <textarea id="edit-essay-content" required rows="15"></textarea>
        <button type="submit">Save</button>
        <button type="button" onclick="hideForm()">Cancel</button>
      </form>
    </div>

    <!-- Edit Wishlist Form -->
    <div id="edit-wishlist-form" class="form hidden">
      <h3>Edit Wishlist Item</h3>
      <form onsubmit="updateWishlistItem(event)">
        <label for="edit-wishlist-title">Title</label>
        <input type="text" id="edit-wishlist-title" placeholder="Title" required>
        <label for="edit-wishlist-category">Category</label>
        <select id="edit-wishlist-category" required>
          <option value="Fiction">Fiction</option>
          <option value="History">History</option>
          <option value="Politics">Politics</option>
          <option value="Philosophy">Philosophy</option>
          <option value="Graphic Novels">Graphic Novels</option>
        </select>
        <label for="edit-wishlist-author">Author <span style="font-weight:normal;color:#888;">(optional)</span></label>
        <input type="text" id="edit-wishlist-author" placeholder="Author">
        <label for="edit-wishlist-note">Note <span style="font-weight:normal;color:#888;">(optional)</span></label>
        <textarea id="edit-wishlist-note" placeholder="Why you want to read it..."></textarea>
        <button type="submit">Save</button>
        <button type="button" onclick="hideForm()">Cancel</button>
      </form>
    </div>

    <!-- Add Wishlist Form -->
    <div id="add-wishlist-form" class="form hidden">
      <h3>Add to Wishlist</h3>
      <form onsubmit="addWishlistItem(event)">
        <label for="wishlist-title-input">Title</label>
        <input type="text" id="wishlist-title-input" placeholder="Title" required oninput="debounceBookLookup('wishlist')">
        <div id="wishlist-book-suggestions" class="book-suggestions hidden"></div>
        <label for="wishlist-category-input">Category</label>
        <select id="wishlist-category-input" required onchange="markCategoryManual('wishlist')">
          <option value="Fiction">Fiction</option>
          <option value="History">History</option>
          <option value="Politics">Politics</option>
          <option value="Philosophy">Philosophy</option>
          <option value="Graphic Novels">Graphic Novels</option>
        </select>
        <label for="wishlist-author-input">Author <span style="font-weight:normal;color:#888;">(optional)</span></label>
        <input type="text" id="wishlist-author-input" placeholder="Author">
        <label for="wishlist-note-input">Note <span style="font-weight:normal;color:#888;">(optional)</span></label>
        <textarea id="wishlist-note-input" placeholder="Why you want to read it..."></textarea>
        <button type="submit">Add</button>
        <button type="button" onclick="hideForm()">Cancel</button>
      </form>
    </div>

  </main>

  <!-- Category Modal for new books during import -->
  <div id="category-modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 class="modal-title">Assign Categories</h3>
      <p class="modal-subtitle">These books are new to SpellBound. Choose a category for each:</p>
      <div id="category-modal-books"></div>
      <div class="modal-actions">
        <button class="modal-confirm-btn" onclick="confirmCategoryModal()">Import</button>
        <button class="modal-cancel-btn" onclick="closeCategoryModal()">Cancel</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button id="nav-home" class="nav-btn active" onclick="showView('home')">
      <i class="nav-icon ph-bold ph-house"></i>
      <span class="nav-label">Home</span>
    </button>
    <button id="nav-books" class="nav-btn" onclick="showView('books')">
      <i class="nav-icon ph-bold ph-books"></i>
      <span class="nav-label">Books</span>
    </button>
    <button id="nav-highlights" class="nav-btn" onclick="showView('highlights')">
      <i class="nav-icon ph-bold ph-sparkle"></i>
      <span class="nav-label">Highlights</span>
    </button>
    <button id="nav-essays" class="nav-btn" onclick="showView('essays')">
      <i class="nav-icon ph-bold ph-pencil-simple"></i>
      <span class="nav-label">Essays</span>
    </button>
    <button id="nav-wishlist" class="nav-btn" onclick="showView('wishlist')">
      <i class="nav-icon ph-bold ph-heart"></i>
      <span class="nav-label">Wishlist</span>
    </button>
    <button id="nav-sprint" class="nav-btn" onclick="showView('sprint')">
      <i class="nav-icon ph-bold ph-lightning"></i>
      <span class="nav-label">Sprint</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
  <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
